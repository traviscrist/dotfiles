# https://developers.openai.com/codex/config-reference
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
personality = "pragmatic"

# Default to full-access execution without approval prompts.
# WARNING: This is extremely powerful and should only be used when you trust
# the environment you run Codex in.
approval_policy = "never"
sandbox_mode = "danger-full-access"

tool_output_token_limit = 25000
# Leave room for native compaction near the 272–273k context window.
# Formula: 273000 - (tool_output_token_limit + 15000)
# With tool_output_token_limit=25000 ⇒ 273000 - (25000 + 15000) = 233000
model_auto_compact_token_limit = 233000
suppress_unstable_features_warning = true
plan_mode_reasoning_effort = "high"

notify = ["/Users/travis/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[features]
multi_agent = true
unified_exec = true
shell_snapshot = true
hooks = true
js_repl = false
terminal_resize_reflow = true

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.reviewer]
